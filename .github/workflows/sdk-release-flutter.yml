name: SDK – Publish Flutter package to pub.dev

on:
  push:
    tags:
      - "sdk-flutter-v*.*.*"

jobs:
  release:
    name: Analyze, test & publish to pub.dev
    runs-on: ubuntu-latest
    environment: pubdev
    defaults:
      run:
        working-directory: sdk/flutter

    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#sdk-flutter-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Ensure pubspec version matches the tag
        run: |
          grep -q "^version: ${{ steps.version.outputs.version }}$" pubspec.yaml
      - name: Install dependencies
        run: dart pub get
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: dart analyze
      - name: Run tests
        run: dart test
      - name: Configure pub.dev token
        run: dart pub token add https://pub.dev --env-var PUB_DEV_ACCESS_TOKEN
      - name: Publish to pub.dev
        run: dart pub publish --force